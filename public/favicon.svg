<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background Circle -->
  <circle cx="96" cy="96" r="96" fill="#1a1a1a"/>

  <!-- Red Accent -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#FF4444" stroke-width="4"/>

  <!-- Dumbbell Icon -->
  <g transform="translate(96, 60)">
    <!-- Left weight -->
    <rect x="-45" y="-12" width="20" height="24" fill="#FF4444" rx="2"/>
    <!-- Left bar -->
    <rect x="-25" y="-6" width="50" height="12" fill="#FF4444" rx="2"/>
    <!-- Right weight -->
    <rect x="25" y="-12" width="20" height="24" fill="#FF4444" rx="2"/>
  </g>

  <!-- Text: BHG -->
  <text x="96" y="145" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FF4444" text-anchor="middle" letter-spacing="2">BHG</text>
</svg>
